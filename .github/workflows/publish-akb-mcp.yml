name: Publish akb-mcp to npm

# Triggers on a git tag like `akb-mcp-v1.0.0`. Tag must match the
# `version` field in packages/akb-mcp-client/package.json — the
# workflow refuses to publish on a mismatch so an out-of-sync tag
# can't poison the registry.
#
# Setup (one-time, by repo admin):
#   gh secret set NPM_TOKEN  # paste an automation token from
#                            # https://www.npmjs.com/settings/<user>/tokens
#
# Releasing:
#   git checkout main && git pull
#   cd packages/akb-mcp-client && cat package.json   # confirm version
#   git tag akb-mcp-v1.0.0
#   git push origin akb-mcp-v1.0.0
#
# The workflow runs the contract test, verifies the tag matches the
# package.json version, then publishes with `--access public
# --provenance` so npm renders the supply-chain badge.

on:
  push:
    tags:
      - "akb-mcp-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # needed for `npm publish --provenance`

    defaults:
      run:
        working-directory: packages/akb-mcp-client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json
        run: |
          tag_version="${GITHUB_REF_NAME#akb-mcp-v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag version ($tag_version) does not match package.json ($pkg_version)"
            exit 1
          fi
          echo "Tag and package.json agree on version $pkg_version"

      - name: Run contract test
        run: node test/contract.test.mjs

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
