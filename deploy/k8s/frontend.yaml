apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: akb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: akb-frontend
  template:
    metadata:
      labels:
        app: akb-frontend
    spec:
      containers:
        - name: frontend
          image: akb-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: akb
spec:
  selector:
    app: akb-frontend
  ports:
    - port: 3000
      targetPort: 3000
