syntax = "proto3";

package coral.export.v1;

import "coral/common/v1/common.proto";
import "coral/storage/v1/storage.proto";

service ExportService {
  rpc ExportTableData(ExportTableDataRequest) returns (ExportTableDataResponse);
  rpc ExportTableDataDownload(ExportTableDataDownloadRequest) returns (stream ExportDownloadEvent);
}

enum ExportMode {
  EXPORT_MODE_UNSPECIFIED = 0;
  EXPORT_MODE_SINGLE_FILE = 1;
  EXPORT_MODE_MULTI_FILE = 2;
}

message ExportQueryOptions {
  optional bool include_internal_columns = 1;
}

message ExportTableDataBody {
  coral.storage.v1.Paths export_paths = 1;
  coral.storage.v1.FileFormat format = 2;
  optional string projection = 3;
  optional string filter = 4;
  optional int32 limit = 5;
  ExportMode mode = 6;
  optional uint64 row_group_size = 7;
  optional uint64 target_file_size_bytes = 8;
  optional uint64 max_row_groups_per_file = 9;
  optional bool include_metrics = 10;
  optional bool allow_writer = 11;
  optional bool include_internal_columns = 12;
}

message ExportTableDataRequest {
  string table_name = 1;
  ExportQueryOptions options = 2;
  ExportTableDataBody request = 3;
}

message ExportResult {
  string output_prefix = 1;
  repeated string files = 2;
  ExportMode mode = 3;
  uint64 total_row_count = 4;
  uint64 total_uncompressed_byte_size = 5;
  uint64 num_row_groups = 6;
  uint64 average_uncompressed_row_group_size = 7;
}

message ExportTableDataResponse {
  ExportResult export_result = 1;
  coral.common.v1.RequestMetrics metrics = 2;
}

message ExportTableDataDownloadOptions {
  coral.storage.v1.FileFormat format = 1;
  optional uint64 row_group_size = 2;
  optional bool allow_writer = 3;
  optional string projection = 4;
  optional string filter = 5;
  optional int32 limit = 6;
  optional bool include_internal_columns = 7;
}

message ExportTableDataDownloadRequest {
  string table_name = 1;
  ExportTableDataDownloadOptions options = 2;
}

message ExportDownloadHeader {
  string filename = 1;
}

message ExportDownloadChunk {
  bytes chunk = 1;
}

message ExportDownloadEvent {
  oneof event {
    ExportDownloadHeader header = 1;
    ExportDownloadChunk chunk = 2;
  }
}
