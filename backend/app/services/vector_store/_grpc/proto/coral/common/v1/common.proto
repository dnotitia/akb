syntax = "proto3";

package coral.common.v1;

message RequestMetrics {
  optional float elapsed_time = 1;
  optional uint64 rss_peak_bytes = 2;
}

message ArrowSchema {
  bytes arrow_schema_ipc = 1;
}

message ScalarValue {
  oneof kind {
    bool bool_value = 1;
    int64 int64_value = 2;
    double double_value = 3;
    string string_value = 4;
  }
}

message NullValue {}

message DynamicList {
  repeated DynamicValue values = 1;
}

message DynamicStruct {
  map<string, DynamicValue> fields = 1;
}

message DynamicValue {
  oneof kind {
    NullValue null_value = 1;
    bool bool_value = 2;
    int64 int64_value = 3;
    double double_value = 4;
    string string_value = 5;
    DynamicList list_value = 6;
    DynamicStruct struct_value = 7;
  }
}

message StringValues {
  repeated string values = 1;
}

message Int64Values {
  repeated int64 values = 1;
}

message Empty {}
