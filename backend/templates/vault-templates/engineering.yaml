name: engineering
display_name: "Engineering"
description: "소프트웨어 엔지니어링 팀 지식베이스"
collections:
  - path: specs
    name: "API & System Specs"
    guide: |
      시스템 설계 문서, API 명세, 데이터 스키마 등 기술 명세를 저장합니다.
      권장 문서 타입: spec
      예시: REST API 설계, DB 스키마, 시스템 아키텍처 문서
    suggested_types: [spec]

  - path: decisions
    name: "Architecture Decision Records"
    guide: |
      기술적 의사결정과 그 배경을 기록합니다.
      권장 문서 타입: decision
      템플릿: doc-templates/adr.md
      예시: "ADR-001: gRPC 도입", "ADR-002: PostgreSQL 선택"
    suggested_types: [decision]

  - path: runbooks
    name: "Runbooks & Playbooks"
    guide: |
      운영 절차, 장애 대응 매뉴얼, 배포 가이드를 저장합니다.
      권장 문서 타입: reference
      템플릿: doc-templates/runbook.md
    suggested_types: [reference]

  - path: retrospectives
    name: "Retrospectives"
    guide: |
      스프린트 회고, 프로젝트 회고, 장애 포스트모템을 저장합니다.
      권장 문서 타입: report
      템플릿: doc-templates/postmortem.md
    suggested_types: [report]

  - path: guides
    name: "Developer Guides"
    guide: |
      개발 환경 셋업, 코딩 컨벤션, 온보딩 가이드를 저장합니다.
      권장 문서 타입: reference
    suggested_types: [reference]

  - path: plans
    name: "Plans & Roadmaps"
    guide: |
      프로젝트 계획, 마일스톤, 기술 로드맵을 저장합니다.
      권장 문서 타입: plan
    suggested_types: [plan]
